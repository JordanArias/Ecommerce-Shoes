<header class="fixed top-0 w-full z-50 bg-background/60 backdrop-blur-xl border-b border-white/10">
  <nav class="flex flex-col md:flex-row md:justify-between md:items-center px-4 md:px-margin-desktop py-2 md:py-4 max-w-container-max mx-auto gap-2">
    <!-- Fila Superior: Logo y Acciones (Móvil) / Contenedor Completo (Desktop) -->
    <div class="flex justify-between items-center w-full md:w-auto gap-4">
      <!-- Logotipo -->
      <a routerLink="/" class="font-display-lg text-[14px] sm:text-[18px] md:text-headline-lg font-black italic text-secondary-fixed tracking-tighter hover:scale-105 transition-transform duration-300 flex-shrink-0">
        SNEAKER_LAB
      </a>

      <!-- Acciones de Usuario (Móvil) -->
      <div class="flex items-center gap-1 md:hidden">
        <button routerLink="/cart" class="relative p-2 text-secondary w-9 h-9 flex items-center justify-center">
          <span class="material-symbols-outlined text-[20px]">shopping_cart</span>
          @if (cartService.itemCount() > 0) {
            <span class="absolute top-0 right-0 bg-secondary-fixed text-on-secondary-fixed text-[8px] font-bold w-4 h-4 flex items-center justify-center rounded-full ring-2 ring-background">
              {{ cartService.itemCount() }}
            </span>
          }
        </button>
        
        @if (!authService.currentUser()) {
          <button routerLink="/login" class="p-2 text-secondary w-9 h-9 flex items-center justify-center">
            <span class="material-symbols-outlined text-[20px]">person</span>
          </button>
        } @else {
          <button (click)="logout()" class="p-2 text-error w-9 h-9 flex items-center justify-center">
            <span class="material-symbols-outlined text-[20px]">logout</span>
          </button>
        }
      </div>
    </div>
    
    <!-- Enlaces de Navegación (Centrados en móvil, izquierda en desktop) -->
    <div class="flex gap-4 md:gap-8 items-center justify-center md:justify-start overflow-x-auto no-scrollbar py-1 md:py-0">
      <a routerLink="/products" 
         routerLinkActive="text-secondary-fixed font-bold border-b-2 border-secondary-fixed pb-0.5" 
         [routerLinkActiveOptions]="{exact: false}" 
         class="font-display-sm text-[10px] md:text-label-bold uppercase tracking-tighter text-on-surface-variant hover:text-secondary transition-colors whitespace-nowrap">
        Productos
      </a>
      
      @if (authService.userRole() === 'admin' || authService.userRole() === 'cliente') {
        <a routerLink="/admin/products" 
           routerLinkActive="text-secondary-fixed font-bold border-b-2 border-secondary-fixed pb-0.5" 
           class="font-display-sm text-[10px] md:text-label-bold uppercase tracking-tighter text-on-surface-variant hover:text-secondary transition-colors whitespace-nowrap">
          Inventario
        </a>
      }

      @if (authService.userRole() === 'admin') {
        <a routerLink="/admin/users" 
           routerLinkActive="text-secondary-fixed font-bold border-b-2 border-secondary-fixed pb-0.5" 
           class="font-display-sm text-[10px] md:text-label-bold uppercase tracking-tighter text-on-surface-variant hover:text-secondary transition-colors whitespace-nowrap">
          Usuarios
        </a>
      }
    </div>

    <!-- Acciones de Usuario (Desktop) -->
    <div class="hidden md:flex items-center gap-stack-sm">
      <button routerLink="/cart" 
              class="relative p-2 hover:bg-white/5 transition-all duration-300 active:scale-95 text-secondary flex items-center justify-center rounded-full w-10 h-10"
              aria-label="Ver carrito">
        <span class="material-symbols-outlined text-[24px]">shopping_cart</span>
        @if (cartService.itemCount() > 0) {
          <span class="absolute -top-0.5 -right-0.5 bg-secondary-fixed text-on-secondary-fixed text-[9px] font-bold w-5 h-5 flex items-center justify-center rounded-full ring-2 ring-background animate-in zoom-in duration-300">
            {{ cartService.itemCount() }}
          </span>
        }
      </button>

      @if (!authService.currentUser()) {
        <button routerLink="/login" 
                class="p-2 hover:bg-white/5 transition-all duration-300 active:scale-95 text-secondary flex items-center justify-center rounded-full w-10 h-10"
                aria-label="Acceder">
          <span class="material-symbols-outlined text-[24px]">person</span>
        </button>
      } @else {
        <button (click)="logout()" 
                class="p-2 hover:bg-error/10 transition-all duration-300 active:scale-95 text-error flex items-center justify-center rounded-full w-10 h-10"
                aria-label="Cerrar Sesión">
          <span class="material-symbols-outlined text-[24px]">logout</span>
        </button>
      }
    </div>
  </nav>
</header>
